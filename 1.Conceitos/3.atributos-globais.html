<!--
    Atributos Globais mais utilizados
        - class
        - contenteditable
        - data-*
        - hidden
        - id
        - style
        - tabindex
        - title
-->

<div class="carrinho" contenteditable="true" id=""cart1">
  conteudo mozinho
  <!--
        utilizamos para aplicar estilo CSS, alem de 
        classificar todo o conteudo, acessar no Java Script
        O contenteditable recebe true ou false, consigo 
        editar no campo mas toda vez que atualizamos a pagina
        vai se perdero conteudo

     -->
</div>

<div class="carrinho" data-id="" id="cart2" style="color: red">
  Carrinho Ferrari
  <!--
            Depois de data posso colocar qualquer nome desde
            que não haja espaços, ou separação por tracinho. 
            Muito utilizado no CSS e Java Script.
            Conseguimos expandir aquantidade de atributos no HTML
            para termos um codigo rico. 
        -->
</div>

<div class="carrinho" hidden>
  conteudo subliminar
  <!--
            utilizado para esconder... ???
        -->
</div>

<div class="carrinho" data-id="" id="name">
  conteudo organized
  <!--
            não posso utilizar o mesmo id para duas tags.
            recomendável 1 por pagina.            
        -->
</div> 

<div tabindex="3">
    controlar

<!--
    Tabindex muito utilizado e sites em que o usuário não tem acesso a
    mouse, e daí utiliza a tecla TAB para se locomover no site
-->
</div>

<div tabindex="1">
    planejar
</div>

<div tabindex="2">
    dirigir
</div>

<div title="Definir um título">
    conteudo mozinho
</div>
